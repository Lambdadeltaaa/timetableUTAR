<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UTAR Timetable</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/static.css">
    <link rel="stylesheet" href="./css/dynamic.css">
</head>

<body>
    <div class="info-display container text-center mb-5">
        <h2>UTAR Timetable Maker</h4>
        <p>NOTE: Assumes all classes are physical, which means that they all have a physical room such as A002.</p>
    </div>

    <div class="data-input container text-center mb-5">
        <textarea id="html-input" class="form-control" rows="10" placeholder="Paste HTML here..."></textarea><br>
        <button id="html-submit" class="btn btn-secondary" >Submit HTML</button>
    </div>

    <br>

    <!-- This part below is dynamically generated from JavaScript. Refer to ./js/edit-timetable.js -->
    <div class="data-edit container mb-5">
        <div class="row">
            <div class="edit-timetable col mb-5">
                <div class="edit-course-name mb-5"></div>
                <div class="edit-calendar-subject mb-5"></div>
                <div class="edit-semester-info"></div>
            </div>
            
            <div class="preview-timetable col mb-5"></div>
        </div>

        <div class="row">
            <div class="submit-edit col text-center"></div>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>

</html>
